name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Verify tag
        shell: bash
        run: |
          test "$(git rev-list -n 1 "$GITHUB_REF_NAME")" = "$(git rev-parse HEAD)"
          test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - run: pnpm test
      - run: pnpm stage publish --access public
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --draft
