name: Setup
description: "Sets up the environment for the workflow"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org
    - run: pnpm install --frozen-lockfile
      shell: bash
